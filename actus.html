<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Nos actus — Feu Follet</title>
    <meta
      name="description"
      content="Suivez l’actualité du collectif Feu Follet : projets en cours, événements, ateliers et expérimentations autour de la discussion collective."
    />

    <link rel="stylesheet" href="/assets/css/reset.css" />
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body>
    <!-- HEADER chargé via JS -->
    <header></header>

    <main>
      <h1 class="visually-hidden">
        Feu Follet — collectif de design et médiation
      </h1>

      <div class="header-room"></div>
      <!-- Pour laisser de la place pour le header avant l'intro -->

      <!-- INTRO -->
      <section class="intro bg-jaune gutter">
        <h2 class="visually-hidden">Les projets que nous avons réalisés</h2>
        <p class="type-catchy max-width-800px">
          On parle de nous... c'est incroyable !
        </p>
      </section>

      <!-- ACTUS -->
      <div class="container gutter-cards">
        <section class="projects">
          <h2 class="type-title">Nos actualités</h2>
          <div class="spacing-med"></div>
          <div id="all-news" class="projects-grid">
            <!-- Les vignettes seront injectées ici en JS -->
          </div>
        </section>
      </div>
    </main>

    <!-- FOOTER chargé via JS -->
    <footer></footer>

    <script src="/assets/js/include.js"></script>
    <script src="/assets/js/projects.js"></script>
  </body>
</html>
