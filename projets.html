<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Nos projets — Feu Follet</title>
    <meta
      name="description"
      content="Découvrez l’ensemble des projets du collectif Feu Follet : ateliers, dispositifs de discussion et médiations créatives pour faire émerger la parole collective dans l’espace public."
    />

    <link rel="stylesheet" href="/assets/css/reset.css" />
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body>
    <!-- HEADER chargé via JS -->
    <header></header>

    <main>
      <h1 class="visually-hidden">
        Feu Follet — collectif de design et médiation
      </h1>

      <div class="header-room"></div>
      <!-- Pour laisser de la place pour le header avant l'intro -->

      <!-- INTRO -->
      <section class="intro bg-eau">
        <h2 class="visually-hidden">Les projets que nous avons réalisés</h2>
        <p class="type-catchy max-width-800px">
          “Le bon outil est celui que nous transformons”<br />
          — phrase à méditer, Coopérative La Braise
        </p>
      </section>

      <!-- PROJETS -->
      <div class="container">
        <section class="projects">
          <h2 class="type-title">Projets réalisés</h2>
          <div class="spacing-small"></div>
          <div id="all-projects" class="projects-grid">
            <!-- Les vignettes seront injectées ici en JS -->
          </div>
        </section>
      </div>
      <div class="spacing-small"></div>

      <div class="cta-slot bg-eau"></div>

      <div class="spacing-med"></div>
    </main>

    <!-- FOOTER chargé via JS -->
    <footer></footer>

    <script src="/assets/js/include.js"></script>
    <script src="/assets/js/projects.js"></script>
  </body>
</html>
